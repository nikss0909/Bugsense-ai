spring.application.name=bugsense-ai
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]
server.port=${SERVER_PORT:8080}
debug=${SPRING_DEBUG:false}
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.com.bugsense=DEBUG

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/bugsense_ai}
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB

jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

gemini.api-key=AIzaSyAtk9zTBmY5iuvu5f2wDEaHuehCI04Ylb4
gemini.model=${GEMINI_MODEL:gemini-1.5-flash}
gemini.timeout-seconds=${GEMINI_TIMEOUT_SECONDS:45}

app.cors.allowed-origin=${FRONTEND_ORIGIN:http://localhost:5173,http://127.0.0.1:5173}
app.upload.max-source-chars=${MAX_SOURCE_CHARS:50000}
